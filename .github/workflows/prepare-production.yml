# .github/workflows/prepare-production.yml
name: Prepare Production Release

on:
    workflow_dispatch: # Manual trigger only

jobs:
    prepare-production:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout develop branch
              uses: actions/checkout@v3
              with:
                  ref: develop
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.14.0"

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.1"
                  tools: composer

            - name: Setup Git
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"

            - name: Install yarn dependencies
              run: yarn install

            - name: Build production assets
              run: yarn build:prod

            - name: Install production PHP dependencies
              run: composer install --no-dev --optimize-autoloader --no-interaction

            - name: Create clean production branch
              run: |
                  # Add all files to staging
                  git add -A
                  # Create orphan branch (no history)
                  git checkout --orphan production-temp

            - name: Remove all from index and keep only production files
              run: |
                  # Remove everything from index
                  git rm -rf --cached .

                  # Add back only production files
                  git add -f dist/
                  git add -f vendor/
                  git add -f includes/
                  git add -f languages/ 2>/dev/null || echo "No languages directory"
                  git add -f .github/
                  git add -f index.php
                  git add -f run.php
                  git add -f LICENSE.txt 2>/dev/null || echo "No LICENSE.txt"
                  git add -f README.md 2>/dev/null || echo "No README.md"
                  git add -f CHANGELOG.md 2>/dev/null || echo "No CHANGELOG.md"

            - name: Commit production build
              run: |
                  git commit -m "Production release from develop - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"

            - name: Force push to master
              run: |
                  git push origin production-temp:master --force

            - name: Clean up
              run: |
                  git checkout develop
                  git branch -D production-temp
