# .github/workflows/prepare-production.yml
name: Prepare Production Release

on:
    workflow_dispatch: # Manual trigger only

jobs:
    prepare-production:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout develop branch
              uses: actions/checkout@v3
              with:
                  ref: develop
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.14.0"

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.1"
                  tools: composer

            - name: Setup Git
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"

            - name: Install yarn dependencies
              run: yarn install

            - name: Build production assets
              run: yarn build:prod

            - name: Install production PHP dependencies
              run: composer install --no-dev --optimize-autoloader --no-interaction

            - name: Stash or clean working directory
              run: |
                  # Add all changes to staging first
                  git add -A

            - name: Create clean production branch
              run: |
                  # Create orphan branch (no history)
                  git checkout --orphan production-temp

            - name: Remove all tracked files
              run: |
                  git rm -rf .

            - name: Copy only production files
              run: |
                  # Add only the files needed for production
                  git add -f dist/
                  git add -f vendor/
                  git add -f includes/
                  git add -f languages/
                  git add -f index.php
                  git add -f run.php
                  git add -f LICENSE.txt
                  git add -f README.md
                  git add -f CHANGELOG.md

                  # Explicitly exclude development files
                  git reset -- src/ node_modules/ .editorconfig .eslintrc .phpcs.cache .stylelintrc package.json yarn.lock phpcs.xml.dist composer.json composer.lock .gitattributes 2>/dev/null || true

            - name: Commit production build
              run: |
                  git commit -m "Production release from develop - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"

            - name: Force push to master
              run: |
                  git push origin production-temp:master --force

            - name: Clean up
              run: |
                  git checkout develop
                  git branch -D production-temp
